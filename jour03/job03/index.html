<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jour 3 - Job 03</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .grid{width:306px;display:grid;grid-template-columns:repeat(3,1fr);grid-gap:3px}
    .tile{width:100px;height:100px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
    .empty{background:#fff;cursor:default}
    .controls{margin:10px 0}
    #msg{font-weight:bold;margin-top:8px}
  </style>
</head>
<body>
  <h1>Job 03 — Taquin (3x3)</h1>
  <p>Cliquer sur une tuile adjacente à la case vide pour la déplacer.</p>

  <div class="controls">
    <button id="shuffle">Mélanger</button>
    <button id="restart">Recommencer</button>
  </div>

  <div class="grid" id="grid"></div>

  <div id="msg"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
